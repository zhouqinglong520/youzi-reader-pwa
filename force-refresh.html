<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>强制刷新 - 游资心法 PWA</title>
  <script>
    // 清除所有缓存
    if ('caches' in window) {
      caches.keys().then(names => {
        names.forEach(name => caches.delete(name));
      });
    }
    // 注销所有 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(reg => reg.unregister());
      });
    }
    // 跳转到 PWA
    setTimeout(() => {
      window.location.href = 'https://zhouqinglong520.github.io/youzi-reader-pwa/?nocache=' + Date.now();
    }, 1000);
  </script>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">
  <h2>正在清除缓存...</h2>
  <p>请稍候，即将跳转到游资心法 PWA（v3 · 130 份）</p>
</body>
</html>
